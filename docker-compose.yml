version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: churnshield-backend
    ports:
      - "8000:7860"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/saved_models:/app/saved_models
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: churnshield-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped